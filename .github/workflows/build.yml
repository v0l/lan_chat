name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-debian-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: lan_chat
            artifact: lan_chat-linux-x86_64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: lan_chat.exe
            artifact: lan_chat-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      # eframe/egui + cpal need X11/Wayland + ALSA dev headers on Linux.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxkbcommon-dev libwayland-dev \
            libgl1-mesa-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test (Linux only)
        if: runner.os == 'Linux'
        run: cargo test --release --locked --target ${{ matrix.target }} --test multicast

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  macos:
    name: macos-universal-dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Build (both arches)
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Assemble .app, icon, and .dmg
        run: |
          set -euo pipefail
          APP="LAN Chat.app"
          rm -rf "$APP" AppIcon.iconset dmgroot dist
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" dist

          # Universal binary.
          lipo -create -output "$APP/Contents/MacOS/lan_chat" \
            target/aarch64-apple-darwin/release/lan_chat \
            target/x86_64-apple-darwin/release/lan_chat
          chmod +x "$APP/Contents/MacOS/lan_chat"

          cp assets/macos/Info.plist "$APP/Contents/Info.plist"

          # PNG -> .icns via iconset.
          mkdir -p AppIcon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s assets/icon.png --out "AppIcon.iconset/icon_${s}x${s}.png" >/dev/null
            d=$((s*2))
            sips -z $d $d assets/icon.png --out "AppIcon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

          # DMG with an /Applications drop target.
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "LAN Chat" -srcfolder dmgroot -ov -format UDZO \
            dist/lan_chat-macos-universal.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan_chat-macos-universal.dmg
          path: dist/lan_chat-macos-universal.dmg
          if-no-files-found: error

  android:
    name: android-apk
    runs-on: ubuntu-latest
    env:
      # Pin a known-good NDK. The runner's default (ANDROID_NDK_LATEST_HOME) is
      # NDK r27+, which breaks cargo-apk builds; r25c is the last release that
      # links cleanly with cargo-apk + rustc for this project.
      NDK_VERSION: 25.2.9519653
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both ABIs listed in Cargo.toml's build_targets, so the build can't
          # fail on a missing rustup target regardless of cargo-apk's --target
          # precedence.
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform, build-tools + pinned NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;${NDK_VERSION}"
          # Fail loudly here (not deep inside cargo-apk) if the platform is missing.
          test -d "$ANDROID_HOME/platforms/android-34" \
            || { echo "::error::android-34 platform not installed under $ANDROID_HOME"; ls -la "$ANDROID_HOME/platforms" || true; exit 1; }
          test -d "$ANDROID_HOME/ndk/${NDK_VERSION}" \
            || { echo "::error::NDK ${NDK_VERSION} not installed under $ANDROID_HOME/ndk"; ls -la "$ANDROID_HOME/ndk" || true; exit 1; }

      - name: Drop platforms cargo-apk can't parse (e.g. android-36.1)
        # cargo-apk 0.10.0 fails enumerating the SDK if any platform dir isn't
        # 'android-<integer>' (runners now ship decimal previews like
        # android-36.1), reporting the misleading 'no platforms installed'.
        run: |
          for d in "$ANDROID_HOME"/platforms/*/; do
            name=$(basename "$d")
            ver=${name#android-}
            if ! [[ "$ver" =~ ^[0-9]+$ ]]; then
              echo "Removing unparseable platform: $name"
              rm -rf "$d"
            fi
          done
          echo "Remaining platforms:"; ls "$ANDROID_HOME/platforms"

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Build APK (arm64, debug-signed)
        run: |
          export ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/${NDK_VERSION}"
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo apk build --target aarch64-linux-android

      - name: Stage APK
        run: |
          mkdir -p dist
          cp target/debug/apk/lan_chat.apk dist/lan_chat-android-arm64.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan_chat-android-arm64.apk
          path: dist/lan_chat-android-arm64.apk
          if-no-files-found: error

  release:
    name: Attach binaries to release
    needs: [build, macos, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
